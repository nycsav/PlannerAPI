<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200" role="img" aria-label="signal2noise — Intelligence, unfiltered.">
  <title>signal2noise — Intelligence, unfiltered.</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;700&amp;family=IBM+Plex+Mono&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="transparent"/>

  <!-- Orange top rule -->
  <rect x="0" y="0" width="800" height="2" fill="#E67E22"/>

  <!-- Bottom rule -->
  <line x1="48" y1="176" x2="752" y2="176" stroke="#374151" stroke-width="1" opacity="0.5"/>

  <!-- Wordmark — centered group -->
  <text
    x="400"
    y="136"
    text-anchor="middle"
    font-family="'Work Sans', 'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="82"
    letter-spacing="-1">

    <!-- signal — bold white -->
    <tspan font-weight="700" fill="#F5F5F5">signal</tspan>

    <!-- 2 — bold orange -->
    <tspan font-weight="700" fill="#E67E22">2</tspan>

    <!-- noise — light italic faded -->
    <tspan font-weight="300" font-style="italic" fill="#9CA3AF" opacity="0.4">noise</tspan>

  </text>

  <!-- Tagline -->
  <text
    x="400"
    y="164"
    text-anchor="middle"
    font-family="'IBM Plex Mono', 'Courier New', monospace"
    font-size="11"
    letter-spacing="3.5"
    fill="#E67E22"
    opacity="0.55">INTELLIGENCE, UNFILTERED.</text>

</svg>